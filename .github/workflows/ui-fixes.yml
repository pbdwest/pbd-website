name: Deploy PBD Marketing Site
on:
  push:
    branches:
      - dev
      - main
      - Ui-fixes
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Deploy to Dev
        if: github.ref_name == 'dev' || github.ref_name == 'Ui-fixes'
        run: |
          aws s3 sync ./dist s3://pbd-marketing-dev-frontend --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_ID }} --paths "/*"
      - name: Deploy to Prod
        if: github.ref_name == 'main' || github.ref_name == 'Ui-fixes'
        run: |
          aws s3 sync ./dist s3://pbd-marketing-prod-frontend --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} --paths "/*"
